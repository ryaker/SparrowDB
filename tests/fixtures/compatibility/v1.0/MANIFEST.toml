# SparrowDB v1.0 Compatibility Fixture Manifest
# Generated by: cargo run --bin gen-compat-fixture
# SPA tickets: SPA-118 (fixture freeze), SPA-119 (acceptance test #13)
#
# This fixture was generated at the v1.0 format baseline.
# Any future SparrowDB version MUST be able to open it without error.

[fixture]
version = "1.0"
format = "tar"
archive = "social_compat.tar"
seed = "deterministic (hardcoded nodes, no RNG)"
generated_by = "gen-compat-fixture bin"

[graph]
nodes = [
    { label = "Person", name = "Alice", age = 30 },
    { label = "Person", name = "Bob",   age = 25 },
    { label = "Person", name = "Carol", age = 35 },
    { label = "Person", name = "Dave",  age = 28 },
    { label = "Company", name = "Acme",    founded = 1999 },
    { label = "Company", name = "Initech", founded = 2001 },
]

[[graph.edges]]
type = "KNOWS"
pairs = [
    ["Alice", "Bob"],
    ["Bob",   "Carol"],
    ["Carol", "Dave"],
]

[[graph.edges]]
type = "WORKS_AT"
pairs = [
    ["Alice", "Acme"],
    ["Bob",   "Acme"],
    ["Carol", "Initech"],
]

[acceptance]
# Queries and expected row counts for SPA-119 acceptance test #13
[[acceptance.checks]]
query = "MATCH (p:Person) RETURN p.name"
min_rows = 4
description = "All Person nodes visible after reopen"

[[acceptance.checks]]
query = "MATCH (a:Person)-[:KNOWS]->(b:Person) RETURN a.name, b.name"
min_rows = 3
description = "All 3 KNOWS edges visible"

[[acceptance.checks]]
query = "MATCH (p:Company) RETURN p.name"
min_rows = 2
description = "All Company nodes visible"
