name: Release — Publish Language Bindings

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Extract version from tag ─────────────────────────────────────────────
  meta:
    name: Extract release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release version: $TAG"

  # ── Publish npm package ──────────────────────────────────────────────────
  publish-npm:
    name: Publish npm (Node.js bindings)
    needs: meta
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build sparrowdb-node
        run: cargo build --release -p sparrowdb-node --target ${{ matrix.target }}

      - name: Locate native artifact
        id: artifact
        run: |
          ARTIFACT=$(ls target/${{ matrix.target }}/release/libsparrowdb_node.so \
                        target/${{ matrix.target }}/release/libsparrowdb_node.dylib \
                        target/${{ matrix.target }}/release/sparrowdb_node.dll \
                        2>/dev/null | head -1)
          if [ -z "$ARTIFACT" ]; then
            echo "ERROR: could not find compiled sparrowdb-node artifact" >&2
            ls target/${{ matrix.target }}/release/ >&2
            exit 1
          fi
          echo "path=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: sparrowdb-node-${{ matrix.artifact-name }}
          path: ${{ steps.artifact.outputs.path }}

  npm-publish:
    name: Publish to npm
    needs: [meta, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble npm package
        run: |
          # Copy native binaries into npm package directory
          cp artifacts/sparrowdb-node-linux-x64/libsparrowdb_node.so \
             npm/sparrowdb/sparrowdb.linux-x64-gnu.node 2>/dev/null || true
          cp artifacts/sparrowdb-node-darwin-arm64/libsparrowdb_node.dylib \
             npm/sparrowdb/sparrowdb.darwin-arm64.node 2>/dev/null || true

          # Also create a generic fallback name
          if [ -f npm/sparrowdb/sparrowdb.linux-x64-gnu.node ]; then
            cp npm/sparrowdb/sparrowdb.linux-x64-gnu.node npm/sparrowdb/sparrowdb.node
          fi

      - name: Sync version to package.json
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          cd npm/sparrowdb
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            // Update optional dependency versions too
            if (pkg.optionalDependencies) {
              for (const dep of Object.keys(pkg.optionalDependencies)) {
                pkg.optionalDependencies[dep] = '$VERSION';
              }
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "package.json version set to $VERSION"
          cat package.json

      - name: Publish to npm
        run: |
          cd npm/sparrowdb
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── PyPI and RubyGems publishing disabled until registry auth is resolved ──
  # See: https://github.com/ryaker/SparrowDB/issues/292 (tracking)
  # Re-enable by uncommenting the publish-pypi and publish-rubygems jobs
  # and adding PYPI_TOKEN / RUBYGEMS_TOKEN secrets to the repo.

  # ── Build CLI binaries (for Homebrew bottles + direct download) ──────────
  build-cli:
    name: Build CLI — ${{ matrix.artifact-name }}
    needs: meta
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: linux-x86_64
            binary: sparrowdb
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: darwin-arm64
            binary: sparrowdb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build sparrowdb CLI
        run: cargo build --release -p sparrowdb-cli --target ${{ matrix.target }}

      - name: Package binary
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          ARCHIVE="sparrowdb-${{ needs.meta.outputs.version }}-${{ matrix.artifact-name }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.artifact-name }}
          path: |
            sparrowdb-${{ needs.meta.outputs.version }}-${{ matrix.artifact-name }}.tar.gz
            sparrowdb-${{ needs.meta.outputs.version }}-${{ matrix.artifact-name }}.tar.gz.sha256

  # ── Create GitHub Release ────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [meta, npm-publish, build-cli]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: cli-artifacts/
          merge-multiple: true

      - name: Compute source tarball SHA256 (for Homebrew formula)
        id: sha
        run: |
          SHA=$(curl -sL "https://github.com/ryaker/SparrowDB/archive/refs/tags/${{ github.ref_name }}.tar.gz" | sha256sum | awk '{print $1}')
          echo "source_sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Gather publish results
        id: results
        run: |
          VER="${{ needs.meta.outputs.version }}"
          SHA="${{ steps.sha.outputs.source_sha }}"
          cat > release-notes.md <<EOF
          ## Release v${VER}

          ### Install

          **Homebrew (macOS / Linux)**
          \`\`\`bash
          brew tap ryaker/sparrowdb
          brew install sparrowdb
          \`\`\`

          **Cargo**
          \`\`\`bash
          cargo add sparrowdb@${VER}
          \`\`\`

          **npm**
          \`\`\`bash
          npm install sparrowdb@${VER}
          \`\`\`

          ### Published packages
          - **Homebrew tap**: \`ryaker/sparrowdb\`
          - **crates.io**: \`sparrowdb = "${VER}"\`
          - **npm**: \`sparrowdb@${VER}\`

          ### Homebrew formula SHA256
          Source tarball: \`${SHA}\`
          _(Used to update the [homebrew-sparrowdb](https://github.com/ryaker/homebrew-sparrowdb) formula)_
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.meta.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(needs.meta.outputs.version, '-') }}
          files: cli-artifacts/*

  # ── Update Homebrew tap formula ──────────────────────────────────────────
  update-homebrew-tap:
    name: Update Homebrew tap
    needs: [meta, github-release]
    if: ${{ !contains(needs.meta.outputs.version, '-') }}  # skip pre-releases
    runs-on: ubuntu-latest
    steps:
      - name: Compute source SHA256
        id: sha
        run: |
          SHA=$(curl -sL "https://github.com/ryaker/SparrowDB/archive/refs/tags/${{ github.ref_name }}.tar.gz" | sha256sum | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ryaker/homebrew-sparrowdb
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update formula version and SHA
        run: |
          VER="${{ needs.meta.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha }}"
          FORMULA="tap/Formula/sparrowdb.rb"
          # Update url line
          sed -i "s|/archive/refs/tags/v[0-9.]*\.tar\.gz|/archive/refs/tags/v${VER}.tar.gz|" "$FORMULA"
          # Update sha256 line
          sed -i "s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA}\"/" "$FORMULA"
          # Update version in formula
          sed -i "s/version \"[0-9.]*\"/version \"${VER}\"/" "$FORMULA"

      - name: Commit and push formula update
        run: |
          VER="${{ needs.meta.outputs.version }}"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sparrowdb.rb
          git commit -m "chore: update formula to v${VER}"
          git push
