name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Unit + Integration tests ───────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --workspace --lib --bins 2>&1 | tee /tmp/unit-results.txt

      - name: Integration tests
        run: cargo test --workspace --test '*' 2>&1 | tee /tmp/integration-results.txt

      - name: Doc tests
        run: cargo test --workspace --doc

  # ── Acceptance checks — phase gates ───────────────────────────────────────
  acceptance:
    name: Acceptance Checks (all 14)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run acceptance suite
        run: |
          cargo test --workspace --test acceptance -- --nocapture \
            2>&1 | tee acceptance-results.txt

      - name: Upload acceptance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: acceptance-results
          path: acceptance-results.txt

  # ── Performance benchmarks ─────────────────────────────────────────────────
  bench:
    name: Benchmarks (regression check)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write  # required to post benchmark diff as PR comment
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks (PR branch)
        id: pr_bench
        run: |
          if cargo bench --workspace -- --output-format bencher \
            2>&1 | tee pr-bench.txt && [ -s pr-bench.txt ]; then
            echo "ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "ran=false" >> "$GITHUB_OUTPUT"
            echo "No benchmarks defined yet — skipping regression check"
            touch pr-bench.txt main-bench.txt bench-diff.txt
          fi

      - name: Checkout main for baseline
        if: steps.pr_bench.outputs.ran == 'true'
        run: |
          git stash
          git checkout main
          cargo bench --workspace -- --output-format bencher \
            2>&1 | tee main-bench.txt
          git checkout -

      - name: Compare benchmarks
        if: steps.pr_bench.outputs.ran == 'true'
        run: |
          python3 scripts/bench-compare.py main-bench.txt pr-bench.txt \
            --threshold 0.10 2>&1 | tee bench-diff.txt
          cat bench-diff.txt

      - name: Post benchmark comment
        uses: actions/github-script@v7
        if: always() && hashFiles('bench-diff.txt') != ''
        with:
          script: |
            const fs = require('fs');
            const diff = fs.existsSync('bench-diff.txt')
              ? fs.readFileSync('bench-diff.txt', 'utf8').trim()
              : '';
            if (!diff) { console.log('No benchmark diff to post'); return; }
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## Benchmark Results\n\`\`\`\n${diff}\n\`\`\``
              });
            } catch (e) {
              console.log(`Could not post comment: ${e.message}`);
            }

  # ── Python bindings (Phase 6+) ─────────────────────────────────────────────
  python:
    name: Python bindings
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check if Python bindings are implemented
        id: py_check
        run: |
          # Treat the crate as implemented only when it has actual pyo3 bindings
          if grep -r '#\[pymodule\]' crates/sparrowdb-python/src/ 2>/dev/null; then
            echo "implemented=true" >> "$GITHUB_OUTPUT"
          else
            echo "implemented=false" >> "$GITHUB_OUTPUT"
            echo "sparrowdb-python not yet implemented — skipping"
          fi

      - name: Install maturin
        if: steps.py_check.outputs.implemented == 'true'
        run: pip install maturin pytest

      - name: Build and test Python bindings
        if: steps.py_check.outputs.implemented == 'true'
        run: |
          cd crates/sparrowdb-python
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest
          maturin develop
          if [ -d tests/python ] && ls tests/python/*.py 2>/dev/null; then
            pytest tests/python/ -v
          else
            echo "No Python tests yet — skipping pytest (tests/python/ not found)"
          fi

  # ── Golden fixture integrity ───────────────────────────────────────────────
  fixtures:
    name: Golden fixture round-trips
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Fixture round-trip tests
        run: |
          cargo test --workspace --test fixtures -- --nocapture \
            2>&1 || echo "No fixture tests yet — will add per phase"

  # ── Ruby bindings (compile check) ─────────────────────────────────────────
  ruby-bindings:
    name: Ruby Bindings (compile check)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Ruby 3.3 with dev headers
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Compile sparrowdb-ruby
        run: cargo check -p sparrowdb-ruby
